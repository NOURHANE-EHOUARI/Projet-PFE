<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salle</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4" style="max-width:500px">
    <h2 th:text="${salle.id != null} ? 'Modifier la salle' : 'Nouvelle salle'"></h2>

    <form th:action="@{/salles/enregistrer}" th:object="${salle}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Nom de la salle</label>
            <input type="text" th:field="*{nom}" class="form-control"
                   placeholder="S4A, AMPHI A..." required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Capacité</label>
            <input type="number" th:field="*{capacite}" class="form-control"
                   min="1" required/>
        </div>

        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a th:href="@{/salles}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
</body>
</html>
