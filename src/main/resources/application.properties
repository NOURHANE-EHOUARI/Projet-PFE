# ===== BASE DE DONNÉES (H2 pour développement) =====
spring.datasource.url=jdbc:h2:mem:pfedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 CONSOLE (accčs via /h2-console pour déboguer) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== HIBERNATE =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== SQL INIT (charge schema.sql + data.sql au démarrage) =====
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===== MULTIPART (upload fichiers Excel) =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

