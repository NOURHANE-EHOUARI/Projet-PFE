<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Salles</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h2>Salles de soutenance</h2>

    <!-- Messages -->
    <div th:if="${succes}" class="alert alert-success" th:text="${succes}"></div>
    <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

    <!-- Formulaire ajout rapide -->
    <div class="card mb-4">
        <div class="card-header">Ajouter une salle</div>
        <div class="card-body">
            <form th:action="@{/salles/enregistrer}" th:object="${salle}" method="post"
                  class="row g-3">
                <div class="col-md-4">
                    <input type="text" th:field="*{nom}" class="form-control"
                           placeholder="Nom (ex: S4A)" required/>
                </div>
                <div class="col-md-4">
                    <input type="number" th:field="*{capacite}" class="form-control"
                           placeholder="Capacité" min="1" required/>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary">Ajouter</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tableau des salles -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nom</th>
                <th>Capacité</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${salles}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.nom}"></td>
                <td th:text="${s.capacite}"></td>
                <td>
                    <a th:href="@{/salles/modifier/{id}(id=${s.id})}"
                       class="btn btn-sm btn-warning">Modifier</a>
                    <a th:href="@{/salles/supprimer/{id}(id=${s.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Supprimer cette salle ?')">Supprimer</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(salles)}">
                <td colspan="4" class="text-center text-muted">Aucune salle enregistrée</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
