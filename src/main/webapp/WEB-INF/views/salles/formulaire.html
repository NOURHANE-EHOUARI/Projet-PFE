<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PFE Planning — Modifier Salle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
            --border:rgba(255,255,255,0.08);
            --accent:#6366f1; --accent2:#818cf8; --accent3:#a5b4fc;
            --t0:#f0f6fc; --t1:#8b949e; --t2:#484f58;
            --card:rgba(255,255,255,0.03); --hover:rgba(99,102,241,0.06);
        }
        body { background:var(--bg); color:var(--t0); font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%);
        }

        .container { position:relative; z-index:1; width:100%; max-width:480px; }

        .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--t1); text-decoration:none; font-size:13px; margin-bottom:24px; transition:color .15s; }
        .back-link:hover { color:var(--t0); }

        .card { background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; }
        .card-header { padding:28px 32px 24px; border-bottom:1px solid var(--border); text-align:center; }
        .card-icon { width:56px; height:56px; border-radius:16px; background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(129,140,248,0.1)); border:1px solid rgba(99,102,241,0.2); display:flex; align-items:center; justify-content:center; font-size:22px; margin:0 auto 16px; }
        .card-title { font-size:20px; font-weight:700; margin-bottom:4px; }
        .card-sub { font-size:13px; color:var(--t1); }

        .card-body { padding:32px; }
        .field { margin-bottom:22px; }
        label { display:block; font-size:12px; font-weight:500; color:var(--t1); margin-bottom:7px; letter-spacing:0.04em; text-transform:uppercase; }
        input[type=text], input[type=number] {
            width:100%; padding:12px 16px; border-radius:10px;
            background:var(--bg3); border:1px solid var(--border);
            color:var(--t0); font-size:15px; font-family:'Inter',sans-serif;
            transition:border-color .18s, box-shadow .18s; outline:none;
        }
        input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,0.12); }
        input::placeholder { color:var(--t2); }

        .btn-row { display:flex; gap:12px; margin-top:8px; }
        .btn { flex:1; padding:13px; border-radius:10px; font-size:14px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; border:none; transition:all .18s; text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:6px; }
        .btn-primary { background:linear-gradient(135deg,var(--accent),#4f46e5); color:#fff; box-shadow:0 4px 14px rgba(99,102,241,0.3); }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(99,102,241,0.4); }
        .btn-secondary { background:var(--bg3); color:var(--t1); border:1px solid var(--border); }
        .btn-secondary:hover { color:var(--t0); border-color:rgba(255,255,255,0.15); }

        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .anim { animation:fadeUp .4s ease both; }
    </style>
</head>
<body>
<div class="container anim">
    <a href="/pfe-planning/salles" class="back-link">← Retour aux salles</a>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">🏛️</div>
            <div class="card-title" th:text="${salle.id != null} ? 'Modifier la salle' : 'Nouvelle salle'"></div>
            <div class="card-sub" th:text="${salle.id != null} ? 'Modifiez les informations de cette salle' : 'Ajoutez une nouvelle salle de soutenance'"></div>
        </div>
        <div class="card-body">
            <form th:action="@{/salles/enregistrer}" th:object="${salle}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="field">
                    <label>Nom de la salle</label>
                    <input type="text" th:field="*{nom}" placeholder="ex: S4A, S5A, AMPHI A" required/>
                </div>
                <div class="field">
                    <label>Capacité</label>
                    <input type="number" th:field="*{capacite}" placeholder="Nombre de places" min="1" required/>
                </div>
                <div class="btn-row">
                    <a href="/pfe-planning/salles" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
