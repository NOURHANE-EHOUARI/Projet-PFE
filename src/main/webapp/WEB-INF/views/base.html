<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title} ?: 'PFE Planning - ENSA Al Hoceima'"></title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --ensa-primary: #1a3a5c;
            --ensa-secondary: #2e6da4;
            --ensa-accent: #f0a500;
        }
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: var(--ensa-primary) !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar-brand {
            font-weight: 700;
            color: white !important;
            font-size: 1.1rem;
        }
        .navbar-brand span {
            color: var(--ensa-accent);
        }
        .nav-link {
            color: rgba(255,255,255,0.85) !important;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: var(--ensa-accent) !important;
        }
        .nav-link.active {
            color: var(--ensa-accent) !important;
            border-bottom: 2px solid var(--ensa-accent);
        }
        .nav-link i {
            margin-right: 5px;
        }
        footer {
            background-color: var(--ensa-primary);
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }
        .main-content {
            min-height: calc(100vh - 130px);
            padding: 30px 0;
        }
    </style>
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                 PFE <span>Planning</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" href="/">
                            <i class="bi bi-house-door"></i> Accueil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'import'} ? 'active'" href="/import">
                            <i class="bi bi-upload"></i> Import Excel
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'planning'} ? 'active'" href="/planning">
                            <i class="bi bi-calendar3"></i> Planning
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'export'} ? 'active'" href="/export">
                            <i class="bi bi-download"></i> Export
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'pvs'} ? 'active'" href="/pvs">
                            <i class="bi bi-file-earmark-text"></i> PVs
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENU PRINCIPAL -->
    <main class="main-content">
        <div class="container">
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>

    <footer class="py-3 mt-auto">
        <div class="container text-center">
            <span>ENSA Al Hoceima - Département Mathématiques & Informatique - 2025/2026</span>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
